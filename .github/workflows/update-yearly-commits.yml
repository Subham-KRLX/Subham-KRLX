name: Update yearly commit count

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh yearly commit count
        run: node scripts/update-yearly-commits.mjs
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_LOGIN: Subham-KRLX

      - name: Commit updated badge
        run: |
          if git diff --quiet; then
            echo "Commit count is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update yearly commit count"
          git push
